name: Build TGTools

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install telethon customtkinter pillow qrcode pyinstaller
      - name: Build
        run: |
          pyinstaller `
            --onefile `
            --noconsole `
            --name "TGTools" `
            --hidden-import telethon `
            --hidden-import customtkinter `
            --hidden-import PIL `
            --hidden-import qrcode `
            --collect-all customtkinter `
            app.py
      - uses: actions/upload-artifact@v4
        with:
          name: TGTools-Windows
          path: dist/TGTools.exe
          retention-days: 30

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install telethon customtkinter pillow qrcode pyinstaller
      - name: Build .app bundle
        run: |
          pyinstaller \
            --windowed \
            --name "TGTools" \
            --hidden-import telethon \
            --hidden-import customtkinter \
            --hidden-import PIL \
            --hidden-import qrcode \
            --collect-all customtkinter \
            app.py
      - name: Zip .app
        run: cd dist && zip -r TGTools-Mac.zip TGTools.app
      - uses: actions/upload-artifact@v4
        with:
          name: TGTools-Mac
          path: dist/TGTools-Mac.zip
          retention-days: 30
