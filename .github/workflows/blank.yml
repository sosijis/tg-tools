name: Build TGTools

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: TGTools-Windows
            output: dist/TGTools.exe
            ext: exe
          - os: macos-latest
            name: TGTools-Mac
            output: dist/TGTools
            ext: bin

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install telethon customtkinter pillow qrcode pyinstaller

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "TGTools" `
            --hidden-import telethon `
            --hidden-import customtkinter `
            --hidden-import PIL `
            --hidden-import qrcode `
            --collect-all customtkinter `
            app.py

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name "TGTools" \
            --hidden-import telethon \
            --hidden-import customtkinter \
            --hidden-import PIL \
            --hidden-import qrcode \
            --collect-all customtkinter \
            app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.output }}
          retention-days: 30
